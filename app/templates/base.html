<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Galaxy Motors{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

  <!-- Top bar -->
  <div class="topbar">
    <div class="container d-flex justify-content-between align-items-center">
      <span><i class="bi bi-geo-alt-fill me-1"></i>123 Moon Crater Blvd, Luna City, MC 00000</span>
      <span><i class="bi bi-telephone-fill me-1"></i>1110001110</span>
    </div>
  </div>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">Galaxy Motors</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/inventory/new">New Vehicles</a></li>
          <li class="nav-item"><a class="nav-link" href="/inventory/used">Used Vehicles</a></li>
          <li class="nav-item"><a class="nav-link" href="/">Search</a></li>
          <li class="nav-item"><a class="nav-link" href="/parts-service">Parts & Service</a></li>
          <li class="nav-item"><a class="nav-link" href="/about">About Us</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Page content -->
  <main class="flex-grow-1">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="footer mt-auto py-3 bg-dark text-white">
    <div class="container text-center">
      <small>&copy; 2025 Galaxy Motors &mdash; 123 Moon Crater Blvd, Luna City &mdash; 1110001110</small>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
